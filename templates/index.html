<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Full-screen background slideshow */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1.5s ease-in-out;
        }

        /* Dark overlay for readability */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: #bb86fc;
            font-weight: 400;
            font-size: 1.8rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .step {
            display: none;
            text-align: left;
            margin-bottom: 1.2rem;
        }
        .step.active {
            display: block;
        }

        label {
            display: block;
            margin-bottom: 0.3rem;
            color: #bbbbbb;
            font-size: 0.95rem;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 0.7rem;
            background: rgba(44, 44, 44, 0.8);
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
            backdrop-filter: blur(4px);
        }
        input:focus, select:focus {
            border-color: #bb86fc;
            background: rgba(60, 60, 60, 0.9);
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
        }

        button {
            background: #bb86fc;
            color: #121212;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #9b6fd4;
            transform: translateY(-1px);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(44, 44, 44, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            display: none;
            border: 1px solid #444;
        }
        .result-box.show {
            display: block;
        }

        .predicted-price {
            font-size: 2rem;
            color: #03dac6;
            font-weight: bold;
            text-shadow: 0 0 12px rgba(3, 218, 198, 0.4);
        }

        .step-indicator {
            color: #888;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Background slideshow container -->
    <div class="bg-slideshow" id="bg-slideshow"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <h1>HOUSE PRICE PREDICTOR</h1>
        <div id="step-indicator" class="step-indicator">Step 1 of 11</div>

        <form id="prediction-form">
            <!-- Steps generated by JavaScript -->
        </form>

        <div class="buttons" id="nav-buttons">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Back</button>
            <button id="nextBtn" onclick="changeStep(1)">Next</button>
        </div>

        <div class="result-box" id="result-box">
            <p>Estimated Price</p>
            <div class="predicted-price" id="result-price">$0</div>
        </div>
    </div>

    <script>
        // ========== Background Slideshow ==========
        const bgElement = document.getElementById('bg-slideshow');
        // Replace these URLs with your own high-quality images (or keep these free ones)
        const backgroundImages = [
            'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80', // modern house
            'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80', // luxury exterior
            'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80', // interior design
            'https://images.unsplash.com/photo-1600573472550-8090b5e0745e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80', // kitchen
            'https://images.unsplash.com/photo-1600566753086-00f18f6b0054?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80'  // backyard
        ];

        let currentBgIndex = 0;
        function changeBackground() {
            bgElement.style.backgroundImage = `url('${backgroundImages[currentBgIndex]}')`;
            currentBgIndex = (currentBgIndex + 1) % backgroundImages.length;
        }
        // Initial background
        changeBackground();
        // Change every 5 seconds
        setInterval(changeBackground, 5000);

        // ========== Step-by-step form logic (unchanged) ==========
        const steps = [
            { id: 'Neighborhood', label: 'Neighborhood (location)', type: 'select', options: [
                { value: 'NAmes', text: 'North Ames' },
                { value: 'CollgCr', text: 'College Creek' },
                { value: 'OldTown', text: 'Old Town' },
                { value: 'Edwards', text: 'Edwards' },
                { value: 'Somerst', text: 'Somerset' },
                { value: 'Gilbert', text: 'Gilbert' },
                { value: 'NridgHt', text: 'Northridge Heights' },
                { value: 'Sawyer', text: 'Sawyer' },
                { value: 'Mitchel', text: 'Mitchell' },
                { value: 'BrkSide', text: 'Brookside' }
            ]},
            { id: 'GrLivArea', label: 'Above ground living area (sqft)', type: 'number', default: 1500 },
            { id: 'TotalBsmtSF', label: 'Total basement area (sqft)', type: 'number', default: 800 },
            { id: 'BedroomAbvGr', label: 'Bedrooms (above ground)', type: 'number', default: 3, min: 0 },
            { id: 'FullBath', label: 'Full bathrooms', type: 'number', default: 2, min: 0 },
            { id: 'HalfBath', label: 'Half bathrooms', type: 'number', default: 1, min: 0 },
            { id: 'KitchenAbvGr', label: 'Kitchens', type: 'number', default: 1, min: 0 },
            { id: 'Fireplaces', label: 'Fireplaces', type: 'number', default: 1, min: 0 },
            { id: 'GarageCars', label: 'Garage capacity (cars)', type: 'number', default: 2, min: 0 },
            { id: 'GarageArea', label: 'Garage area (sqft)', type: 'number', default: 400 },
            { id: 'CentralAir', label: 'Central Air Conditioning', type: 'select', options: [
                { value: 'Y', text: 'Yes' },
                { value: 'N', text: 'No' }
            ]}
        ];

        let currentStep = 0;
        const form = document.getElementById('prediction-form');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stepIndicator = document.getElementById('step-indicator');
        const resultBox = document.getElementById('result-box');
        const resultPrice = document.getElementById('result-price');

        function renderSteps() {
            form.innerHTML = '';
            steps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = `step ${index === currentStep ? 'active' : ''}`;
                stepDiv.id = `step-${index}`;

                const label = document.createElement('label');
                label.htmlFor = step.id;
                label.textContent = step.label;

                let input;
                if (step.type === 'select') {
                    input = document.createElement('select');
                    input.id = step.id;
                    input.name = step.id;
                    step.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt.value;
                        option.textContent = opt.text;
                        input.appendChild(option);
                    });
                } else {
                    input = document.createElement('input');
                    input.type = step.type;
                    input.id = step.id;
                    input.name = step.id;
                    if (step.default !== undefined) input.value = step.default;
                    if (step.min !== undefined) input.min = step.min;
                    if (step.required) input.required = true;
                }

                stepDiv.appendChild(label);
                stepDiv.appendChild(input);
                form.appendChild(stepDiv);
            });
            updateNavigation();
        }

        function updateNavigation() {
            const allSteps = document.querySelectorAll('.step');
            allSteps.forEach((step, idx) => {
                step.classList.toggle('active', idx === currentStep);
            });
            stepIndicator.textContent = `Step ${currentStep + 1} of ${steps.length}`;
            prevBtn.disabled = currentStep === 0;

            if (currentStep === steps.length - 1) {
                nextBtn.textContent = 'Predict Price';
                nextBtn.onclick = predictPrice;
            } else {
                nextBtn.textContent = 'Next';
                nextBtn.onclick = () => changeStep(1);
            }

            resultBox.classList.remove('show');
        }

        function changeStep(delta) {
            const newStep = currentStep + delta;
            if (newStep >= 0 && newStep < steps.length) {
                currentStep = newStep;
                updateNavigation();
            }
        }

        async function predictPrice() {
            const data = {};
            steps.forEach(step => {
                const input = document.getElementById(step.id);
                if (input) {
                    if (step.type === 'select' || step.id === 'CentralAir') {
                        data[step.id] = input.value;
                    } else {
                        data[step.id] = parseFloat(input.value) || 0;
                    }
                }
            });

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    resultPrice.textContent = `$${result.predicted_price.toLocaleString()}`;
                    resultBox.classList.add('show');
                    resultBox.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert('Error: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Network error. Is the server running?');
            }
        }

        renderSteps();
    </script>
</body>
</html>
